name: Fetch Legal News

on:
  schedule:
    # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch-news:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and save legal news
        run: |
          echo "📰 Fetching legal news..."
          
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ secrets.NEWS_REVALIDATE_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SITE_URL }}/api/news-feed")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n-1)
          
          echo "Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" != "200" ]; then
            echo "⚠️ News fetch returned non-200 status"
            exit 1
          fi
          
          echo "✅ News fetch complete!"
