name: Deploy to Hostinger VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            cd /var/www/cavalcantemelo
            
            echo "📥 Pulling latest code..."
            git pull origin main
            
            echo "📦 Installing dependencies..."
            npm ci --production=false
            
            echo "🔨 Building..."
            npm run build
            
            echo "🔄 Restarting with zero-downtime..."
            pm2 reload cavalcantemelo --update-env
            pm2 save
            
            echo "✅ Deploy complete!"

  fetch-news:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Trigger news fetch
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.NEWS_REVALIDATE_SECRET }}" \
            -H "Content-Type: application/json" \
            "${{ secrets.SITE_URL }}/api/news-feed" \
            || echo "News fetch skipped (site may still be starting)"
